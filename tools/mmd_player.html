<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMD Player</title>
<script src="https://unpkg.com/tone@14/build/Tone.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;  --surf:    #161b22;  --surf2:   #1c2128;
  --border:  #2d333b;  --border2: #444c56;  --accent:  #7c3aed;
  --glow:    #a78bfa;  --play:    #22c55e;  --play-dim:#14532d;
  --t1:      #38bdf8;  --t2:      #fb923c;  --text:    #cdd9e5;
  --dim:     #636e7b;  --wkey:    #e8ecf4;  --bkey:    #111827;
  --mmd-bg:  #080d10;  --mmd-fg:  #7ee8b2;  --mmd-hl:  rgba(124,58,237,.5);
}
html, body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; overflow-x: hidden; }

/* ── Header ── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px; background: var(--surf); border-bottom: 1px solid var(--border);
}
#header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .06em; color: var(--glow); }
.hbtns { display: flex; gap: 8px; align-items: center; }

/* ── Controls ── */
#cbar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 8px 18px; background: var(--surf); border-bottom: 1px solid var(--border);
}
.cg { display: flex; align-items: center; gap: 6px; font-size: .8rem; color: var(--dim); }
.cg label { white-space: nowrap; }
select { background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 3px 7px; font-size: .82rem; }
input[type=range] { width: 80px; accent-color: var(--accent); }
#bpm-val { min-width: 2.5em; text-align: right; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

/* ── Buttons ── */
.btn {
  padding: 5px 13px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surf2); color: var(--text); cursor: pointer;
  font-size: .82rem; transition: background .12s, border-color .12s;
}
.btn:hover { background: var(--border2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn.primary:hover { background: var(--glow); border-color: var(--glow); }

#transport { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.tbtn {
  width: 38px; height: 38px; border: none; border-radius: 50%;
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .1s, box-shadow .15s;
}
.tbtn:active { transform: scale(.91); }
#btn-play { background: var(--accent); color: #fff; }
#btn-play:hover { box-shadow: 0 0 14px var(--glow); }
#btn-play.active { background: var(--play); animation: heartbeat .7s ease-in-out infinite; }
#btn-stop { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }
#btn-stop:hover { background: var(--border2); }
@keyframes heartbeat {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
  50%      { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
}

/* ── Staff slot ── */
#staff-slot {
  margin: 10px 18px 4px; height: 58px;
  border: 1px dashed var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; color: var(--dim); letter-spacing: .05em;
}

/* ── Grid ── */
#grid-wrap { padding: 8px 18px 4px; overflow-x: auto; }
.grid-row { display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
.track-label {
  width: 28px; flex-shrink: 0; font-size: .72rem; font-weight: 700;
  letter-spacing: .06em; text-align: center; padding: 4px 0; border-radius: 4px;
}
.track-label.t1 { color: var(--t1); background: rgba(56,189,248,.1); }
.track-label.t2 { color: var(--t2); background: rgba(251,146,60,.1); }
.mgroup-wrap { display: flex; flex-direction: column; gap: 3px; }
.mnum { font-size: .63rem; color: var(--dim); text-align: center; letter-spacing: .08em; }
.mgroup { display: flex; gap: 3px; padding: 5px 7px; background: var(--surf); border: 1px solid var(--border); border-radius: 9px; }
.beat-cell {
  width: 50px; height: 44px; background: var(--surf2); border: 2px solid var(--border);
  border-radius: 7px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; cursor: pointer; user-select: none;
  transition: border-color .1s, background .1s, box-shadow .1s; position: relative;
}
.beat-cell .beat-num { font-size: .55rem; color: var(--dim); position: absolute; top: 4px; }
.beat-cell .note-txt { font-family: 'Courier New', monospace; font-size: .88rem; font-weight: 700; color: var(--dim); pointer-events: none; }
.beat-cell:hover { border-color: var(--border2); background: #1e252f; }
.beat-cell.has-note { border-color: #3b4a60; }
.beat-cell.has-note .note-txt { color: var(--t1); }
.beat-cell.t2-row.has-note .note-txt { color: var(--t2); }
.beat-cell.selected { border-color: var(--glow); background: #1c1433; box-shadow: 0 0 0 2px rgba(167,139,250,.25); }
.beat-cell.selected .note-txt { color: var(--glow); }
.beat-cell.playing { border-color: var(--play); background: var(--play-dim); box-shadow: 0 0 10px rgba(34,197,94,.35); }
.beat-cell.playing .note-txt { color: var(--play); }

/* ── MMD panel — primary ── */
#mmd-section {
  margin: 8px 18px 6px;
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
#mmd-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px; background: var(--surf); border-bottom: 1px solid var(--border);
}
.mmd-label { font-size: .78rem; font-weight: 700; letter-spacing: .1em; color: var(--mmd-fg); }
#mmd-hint { font-size: .68rem; color: var(--dim); flex: 1; }
#mmd-err { display: none; font-size: .68rem; color: #f87171; font-family: monospace; flex: 1; }

/* shared textarea / pre styles */
#mmd-edit, #mmd-view {
  width: 100%; min-height: 190px; max-height: 300px;
  background: var(--mmd-bg); color: var(--mmd-fg);
  font-family: 'Courier New', monospace; font-size: .82rem; line-height: 1.65;
  padding: 10px 14px; white-space: pre; overflow: auto;
}
#mmd-edit {
  display: block; border: none; outline: none; resize: vertical;
  tab-size: 4; -moz-tab-size: 4;
}
#mmd-edit:focus { box-shadow: inset 0 0 0 1px var(--accent); }
#mmd-view {
  display: none; /* shown while playing */
  overflow-x: auto; overflow-y: auto;
}
#mmd-view mark {
  background: var(--mmd-hl); color: #e2d9f3;
  border-radius: 2px; outline: 1px solid rgba(167,139,250,.7);
  font-style: normal;
}

/* ── Piano ── */
#piano-section {
  padding: 8px 18px 14px; background: var(--surf); border-top: 1px solid var(--border);
}
.piano-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.oct-nav { display: flex; align-items: center; gap: 7px; }
.oct-nav button {
  width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surf2); color: var(--text); cursor: pointer; font-size: .9rem;
}
.oct-nav button:hover { background: var(--border2); }
#oct-label { min-width: 3.6em; text-align: center; font-size: .85rem; font-weight: 600; color: var(--glow); }
.piano-hints { font-size: .72rem; color: var(--dim); display: flex; gap: 12px; flex-wrap: wrap; }
.piano-hints kbd {
  background: var(--surf2); border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 5px; font-size: .68rem; color: var(--text);
}
#btn-clear {
  padding: 4px 10px; font-size: .78rem; border-radius: 5px;
  border: 1px solid var(--border); background: var(--surf2); color: var(--dim); cursor: pointer;
}
#btn-clear:hover { color: #f87171; border-color: #6b2222; background: #1a0e0e; }
#keys-wrap { position: relative; height: 106px; }
.wkey {
  position: absolute; background: var(--wkey); border: 1px solid #888;
  border-radius: 0 0 5px 5px; cursor: pointer; height: 100px; top: 0;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px;
  font-size: .58rem; color: #666; user-select: none; transition: background .07s; z-index: 1;
}
.wkey:hover { background: #d0d8f0; }
.wkey.down  { background: var(--glow); }
.bkey {
  position: absolute; background: var(--bkey); border-radius: 0 0 4px 4px;
  cursor: pointer; height: 62px; top: 0; user-select: none; transition: background .07s; z-index: 2;
}
.bkey:hover { background: #2d3a50; }
.bkey.down  { background: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>&#127925; MMD Player</h1>
  <div class="hbtns">
    <button class="btn" onclick="document.getElementById('file-in').click()">Import .mmd</button>
    <input type="file" id="file-in" accept=".mmd,.txt" style="display:none" onchange="importFile(this)">
    <button class="btn primary" onclick="exportMMD()">Export .mmd</button>
    <button class="btn" onclick="newScore()">New Score</button>
  </div>
</div>

<!-- Controls -->
<div id="cbar">
  <div class="cg">
    <label>Time</label>
    <select id="sel-time" onchange="applySettings()">
      <option value="4/4" selected>4/4</option>
      <option value="3/4">3/4</option>
      <option value="2/4">2/4</option>
      <option value="6/8">6/8</option>
    </select>
  </div>
  <div class="cg">
    <label>Bars</label>
    <select id="sel-bars" onchange="applySettings()">
      <option value="2">2</option>
      <option value="4" selected>4</option>
      <option value="8">8</option>
      <option value="16">16</option>
    </select>
  </div>
  <div class="cg">
    <label>BPM <span id="bpm-val">120</span></label>
    <input type="range" id="sl-bpm" min="40" max="240" value="120" oninput="onBpm(this.value)">
  </div>
  <div id="transport">
    <button class="tbtn" id="btn-play" onclick="togglePlay()" title="Play [Space]">&#9654;</button>
    <button class="tbtn" id="btn-stop" onclick="stopAll()"   title="Stop [Esc]">&#9632;</button>
  </div>
</div>

<!-- Staff (v2 placeholder) -->
<div id="staff-slot">Staff notation &mdash; coming in v2</div>

<!-- Grid -->
<div id="grid-wrap"><div id="grid"></div></div>

<!-- MMD — primary panel -->
<div id="mmd-section">
  <div id="mmd-bar">
    <span class="mmd-label">MMD</span>
    <span id="mmd-hint">edit directly &middot; piano fills selected beat</span>
    <span id="mmd-err"></span>
  </div>
  <textarea id="mmd-edit" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
  <pre id="mmd-view" aria-hidden="true"></pre>
</div>

<!-- Piano -->
<div id="piano-section">
  <div class="piano-top">
    <div class="oct-nav">
      <button onclick="shiftOct(-1)">&#9664;</button>
      <span id="oct-label">Oct 4</span>
      <button onclick="shiftOct(+1)">&#9654;</button>
    </div>
    <div class="piano-hints">
      <span><kbd>&larr; &rarr;</kbd> navigate</span>
      <span><kbd>&uarr; &darr;</kbd> track</span>
      <span><kbd>Del</kbd> clear</span>
      <span><kbd>Space</kbd> play/stop</span>
    </div>
    <button id="btn-clear" onclick="clearSelected()">&#x2715; Clear</button>
  </div>
  <div id="keys-wrap"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
const S = {
  beatsPerBar: 4,
  beatUnit:    4,
  numBars:     4,
  bpm:         120,
  octave:      4,
  selTrack:    0,
  selBeat:     0,
  playhead:    -1,
  playing:     false,
  tracks:      [[], []],
  tokenMap:    [],   // [{start,end,track,beat}] — positions in current mmd-edit text
};

function totalSteps() { return S.numBars * S.beatsPerBar; }

function initTracks() {
  const n = totalSteps();
  S.tracks = [
    Array.from({length: n}, () => ({note: null})),
    Array.from({length: n}, () => ({note: null})),
  ];
  S.selBeat  = 0;
  S.playhead = -1;
}

// ══════════════════════════════════════════════════════════════════════════════
// Audio (Tone.js)
// ══════════════════════════════════════════════════════════════════════════════
let audioReady = false, synth1, synth2, draw;

async function initAudio() {
  if (audioReady) return;
  await Tone.start();
  const rev = new Tone.Reverb({decay: 1.0, wet: 0.18}).toDestination();
  synth1 = new Tone.PolySynth(Tone.Synth, {
    oscillator: {type: 'triangle'},
    envelope:   {attack: 0.02, decay: 0.25, sustain: 0.45, release: 1.1}
  }).connect(rev);
  synth2 = new Tone.PolySynth(Tone.Synth, {
    oscillator: {type: 'sine'},
    envelope:   {attack: 0.04, decay: 0.4, sustain: 0.35, release: 1.4}
  }).connect(rev);
  synth2.volume.value = -4;
  draw = Tone.getDraw();
  audioReady = true;
}

async function previewNote(n) {
  await initAudio();
  try { synth1.triggerAttackRelease(n, '8n'); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════════════════════
// Playback
// ══════════════════════════════════════════════════════════════════════════════
let seq = null;

async function togglePlay() {
  if (S.playing) { stopAll(); return; }
  await initAudio();

  // Parse any manual edits, then freeze a canonical snapshot
  syncFromTextarea(true);

  Tone.Transport.bpm.value = S.bpm;
  const steps = totalSteps();
  const iv    = `${S.beatUnit}n`;
  const synths = [synth1, synth2];

  seq = new Tone.Sequence((time, idx) => {
    S.tracks.forEach((track, t) => {
      const c = track[idx];
      if (c?.note) {
        try { synths[t].triggerAttackRelease(c.note, iv, time); } catch(e) {}
      }
    });
    draw.schedule(() => advancePlayhead(idx), time);
  }, Array.from({length: steps}, (_, i) => i), iv);

  seq.loop = true;
  seq.start(0);
  Tone.Transport.start();
  S.playing = true;

  // Switch to highlighted read-only view
  document.getElementById('mmd-edit').style.display = 'none';
  document.getElementById('mmd-view').style.display = 'block';
  document.getElementById('mmd-hint').textContent   = 'playing — stop to edit';
  const bp = document.getElementById('btn-play');
  bp.innerHTML = '&#9646;&#9646;';
  bp.classList.add('active');
}

function stopAll() {
  Tone.Transport.stop();
  Tone.Transport.cancel(0);
  if (seq) { seq.dispose(); seq = null; }
  S.playing = false;
  const prev = S.playhead;
  S.playhead = -1;
  if (prev >= 0) { refreshBeat(0, prev); refreshBeat(1, prev); }

  document.getElementById('mmd-edit').style.display = 'block';
  document.getElementById('mmd-view').style.display = 'none';
  document.getElementById('mmd-hint').textContent   = 'edit directly · piano fills selected beat';
  const bp = document.getElementById('btn-play');
  bp.innerHTML = '&#9654;';
  bp.classList.remove('active');
}

function advancePlayhead(idx) {
  const prev = S.playhead;
  S.playhead = idx;
  if (prev >= 0) { refreshBeat(0, prev); refreshBeat(1, prev); }
  refreshBeat(0, idx); refreshBeat(1, idx);
  highlightPlayhead(idx);
}

function onBpm(v) {
  S.bpm = +v;
  document.getElementById('bpm-val').textContent = v;
  if (S.playing) Tone.Transport.bpm.value = S.bpm;
}

// ══════════════════════════════════════════════════════════════════════════════
// Grid
// ══════════════════════════════════════════════════════════════════════════════
function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  ['T1','T2'].forEach((label, t) => {
    const row = mkEl('div', 'grid-row');
    const lbl = mkEl('div', `track-label t${t+1}`);
    lbl.textContent = label;
    row.appendChild(lbl);
    for (let m = 0; m < S.numBars; m++) {
      const wrap = mkEl('div', 'mgroup-wrap');
      const mn   = mkEl('div', 'mnum');
      mn.textContent = `M${m+1}`;
      wrap.appendChild(mn);
      const mg = mkEl('div', 'mgroup');
      for (let b = 0; b < S.beatsPerBar; b++) {
        mg.appendChild(makeBeatCell(t, m * S.beatsPerBar + b, b+1));
      }
      wrap.appendChild(mg);
      row.appendChild(wrap);
    }
    g.appendChild(row);
  });
}

function makeBeatCell(track, idx, beatNum) {
  const el = mkEl('div', `beat-cell${track===1?' t2-row':''}`);
  el.dataset.track = track;
  el.dataset.idx   = idx;
  const bn = mkEl('span', 'beat-num'); bn.textContent = beatNum; el.appendChild(bn);
  const nt = mkEl('span', 'note-txt'); el.appendChild(nt);
  applyBeatClass(el, track, idx);
  updateBeatLabel(nt, track, idx);
  el.addEventListener('click', () => { S.selTrack = track; selectBeat(idx); });
  return el;
}

function getCell(track, idx) {
  return document.querySelector(`.beat-cell[data-track="${track}"][data-idx="${idx}"]`);
}

function refreshBeat(track, idx) {
  const el = getCell(track, idx);
  if (!el) return;
  applyBeatClass(el, track, idx);
  updateBeatLabel(el.querySelector('.note-txt'), track, idx);
}

function applyBeatClass(el, track, idx) {
  const note   = S.tracks[track][idx]?.note;
  const isSel  = (track === S.selTrack && idx === S.selBeat);
  const isPlay = (idx === S.playhead);
  el.classList.toggle('has-note', !!note);
  el.classList.toggle('selected', isSel);
  el.classList.toggle('playing',  isPlay);
}

function updateBeatLabel(span, track, idx) {
  span.textContent = S.tracks[track][idx]?.note || '·';
}

function selectBeat(idx) {
  const prev = S.selBeat;
  S.selBeat = idx;
  refreshBeat(0, prev); refreshBeat(1, prev);
  refreshBeat(0, idx);  refreshBeat(1, idx);
}

// ══════════════════════════════════════════════════════════════════════════════
// Note entry
// ══════════════════════════════════════════════════════════════════════════════
function setNote(track, idx, note) {
  S.tracks[track][idx] = {note};
  refreshBeat(track, idx);
  rebuildMMD();
}

function clearNote(track, idx) {
  S.tracks[track][idx] = {note: null};
  refreshBeat(track, idx);
  rebuildMMD();
}

function clearSelected() { clearNote(S.selTrack, S.selBeat); }

function advance() {
  if (S.selBeat < totalSteps() - 1) selectBeat(S.selBeat + 1);
}

// ══════════════════════════════════════════════════════════════════════════════
// Piano keyboard
// ══════════════════════════════════════════════════════════════════════════════
const WHITE = ['C','D','E','F','G','A','B'];
const BLACK = [{n:'C#',x:.63},{n:'D#',x:1.63},null,{n:'F#',x:3.63},{n:'G#',x:4.63},{n:'A#',x:5.63}];
const WW = 50, BW = 30;

function renderPiano() {
  const wrap = document.getElementById('keys-wrap');
  wrap.style.width = `${WHITE.length * WW}px`;
  wrap.innerHTML = '';
  WHITE.forEach((n, i) => {
    const k = mkEl('div', 'wkey');
    k.style.cssText  = `left:${i*WW}px;width:${WW-2}px;`;
    k.textContent    = n;
    k.dataset.note   = `${n}${S.octave}`;
    k.addEventListener('pointerdown', e => { e.preventDefault(); pianoHit(k.dataset.note, k); });
    wrap.appendChild(k);
  });
  BLACK.forEach(bk => {
    if (!bk) return;
    const k = mkEl('div', 'bkey');
    k.style.cssText = `left:${bk.x*WW - BW/2}px;width:${BW}px;`;
    k.dataset.note  = `${bk.n}${S.octave}`;
    k.addEventListener('pointerdown', e => { e.preventDefault(); pianoHit(k.dataset.note, k); });
    wrap.appendChild(k);
  });
}

function pianoHit(noteStr, keyEl) {
  keyEl.classList.add('down');
  setTimeout(() => keyEl.classList.remove('down'), 200);
  previewNote(noteStr);
  setNote(S.selTrack, S.selBeat, noteStr);
  advance();
}

function shiftOct(d) {
  S.octave = Math.max(1, Math.min(8, S.octave + d));
  document.getElementById('oct-label').textContent = `Oct ${S.octave}`;
  renderPiano();
}

// ══════════════════════════════════════════════════════════════════════════════
// MMD Build  (grid → text + token map)
// ══════════════════════════════════════════════════════════════════════════════
function buildMMD() {
  const n = S.beatsPerBar, d = S.beatUnit;
  const map = [];  // [{start, end, track, beat}]

  let out = `@BPM: ${S.bpm}\n@TIME: ${n}/${d}\n@KEY: C\n@TRACKS: T1=Melody, T2=Harmony\n`;

  ['T1','T2'].forEach((lbl, t) => {
    const cells = S.tracks[t];
    if (cells.every(c => !c.note)) return;

    out += `\n${lbl}: `;
    const pad = ' '.repeat(lbl.length + 2);  // align continuation lines

    cells.forEach((c, i) => {
      const tok = c.note ? `${c.note}/${d}` : 'R';
      const start = out.length;
      out += tok;
      map.push({start, end: out.length, track: t, beat: i});

      const endOfBar = (i + 1) % n === 0;
      if (i + 1 < cells.length) {
        out += endOfBar ? ` |\n${pad}` : `; `;
      }
    });
    out += ` |.`;
  });

  return {text: out, map};
}

// Called after any grid change (piano hit, clear, settings)
function rebuildMMD() {
  const {text, map} = buildMMD();
  S.tokenMap = map;
  document.getElementById('mmd-edit').value = text;
  showError('');
}

// ══════════════════════════════════════════════════════════════════════════════
// MMD Playhead highlight  (text → <pre> with <mark> spans)
// ══════════════════════════════════════════════════════════════════════════════
function highlightPlayhead(beatIdx) {
  const text   = document.getElementById('mmd-edit').value;
  const active = S.tokenMap.filter(t => t.beat === beatIdx).sort((a,b) => a.start - b.start);
  let html = '', pos = 0;
  for (const tok of active) {
    html += esc(text.slice(pos, tok.start));
    html += `<mark>${esc(text.slice(tok.start, tok.end))}</mark>`;
    pos   = tok.end;
  }
  html += esc(text.slice(pos));
  document.getElementById('mmd-view').innerHTML = html;

  // Scroll highlighted token into view
  if (active.length > 0) {
    const mark = document.getElementById('mmd-view').querySelector('mark');
    if (mark) mark.scrollIntoView({block: 'nearest'});
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// MMD Parse  (textarea text → grid state)
// ══════════════════════════════════════════════════════════════════════════════
let parseTimer = null;

document.getElementById('mmd-edit').addEventListener('input', () => {
  clearTimeout(parseTimer);
  parseTimer = setTimeout(() => syncFromTextarea(false), 450);
});

// parseOnly=true: parse without overwriting the textarea
function syncFromTextarea(parseOnly) {
  const text = document.getElementById('mmd-edit').value;
  const err  = parseMMDText(text);
  showError(err || '');

  // Rebuild token map so playhead works after user edits
  const {map} = buildMMD();
  S.tokenMap = map;
  // But keep user's text in the textarea — don't overwrite it
  // (the map positions will be approximate; they reference built text, not user text)
  // For accurate highlighting, re-derive map positions from the user's text directly:
  S.tokenMap = deriveTokenMap(text);
}

// Walk the user's text and find note token positions, matching to track/beat indices
function deriveTokenMap(text) {
  const map = [];
  const noteRE = /([A-Ga-g][#b]?\d)(?:\/\d+\.{0,2})?/g;

  ['T1','T2'].forEach((lbl, t) => {
    const trackRE = new RegExp(`^${lbl}:\\s*([\\s\\S]*?)\\s*\\|\\.`, 'm');
    const tm = trackRE.exec(text);
    if (!tm) return;

    // Offset of the captured content within the full text
    const contentOffset = tm.index + tm[0].indexOf(tm[1]);

    const raw     = tm[1].replace(/\n\s*/g, ' ');  // flatten continuations
    const rawOff  = tm.index + tm[0].indexOf(tm[1]); // redundant but explicit

    // Map flattened positions back to original text positions is complex;
    // instead walk the original content directly
    const contentStart = text.indexOf(tm[1], tm.index);
    const content      = tm[1];

    // Split by | to get measures, track char offsets
    let beatIdx   = 0;
    let charCursor = 0; // within content string

    const parts = content.split(/(\|)/);  // keep delimiters
    for (const part of parts) {
      if (part === '|') { charCursor += 1; continue; }
      const slots = part.split(';');
      for (const slot of slots) {
        const m = slot.match(/^\s*([A-Ga-g][#b]?\d)(?:\/\d+\.{0,2})?/);
        if (m) {
          const slotStart  = content.indexOf(slot, charCursor);
          const noteOffset = slot.search(/[A-Ga-g][#b]?\d/);
          const absStart   = contentStart + slotStart + noteOffset;
          const note       = m[1];
          map.push({
            start: absStart,
            end:   absStart + m[0].trim().length,
            track: t,
            beat:  beatIdx
          });
        }
        charCursor += slot.length + 1; // +1 for the ';'
        beatIdx++;
      }
    }
  });

  return map;
}

function parseMMDText(text) {
  try {
    const bpmM  = text.match(/@BPM:\s*(\d+)/);
    const timeM = text.match(/@TIME:\s*(\d+)\/(\d+)/);

    if (bpmM) {
      const v = +bpmM[1];
      if (v >= 20 && v <= 400) {
        S.bpm = v;
        document.getElementById('bpm-val').textContent = v;
        document.getElementById('sl-bpm').value = v;
        if (S.playing) Tone.Transport.bpm.value = v;
      }
    }
    if (timeM) {
      S.beatsPerBar = +timeM[1];
      S.beatUnit    = +timeM[2];
      const ts = `${S.beatsPerBar}/${S.beatUnit}`;
      const sel = document.getElementById('sel-time');
      if ([...sel.options].some(o => o.value === ts)) sel.value = ts;
    }

    const expected = S.numBars * S.beatsPerBar;
    const newTracks = [
      Array.from({length: expected}, () => ({note: null})),
      Array.from({length: expected}, () => ({note: null})),
    ];

    ['T1','T2'].forEach((lbl, t) => {
      const re = new RegExp(`^${lbl}:\\s*([\\s\\S]*?)\\s*\\|\\.`, 'm');
      const m  = re.exec(text);
      if (!m) return;

      const content  = m[1].replace(/\n\s+/g, ' ').trim();
      const measures = content.split(/\s*\|\s*/).filter(s => s.trim());
      let beatIdx    = 0;

      for (const meas of measures) {
        const slots = meas.split(';').map(s => s.trim()).filter(Boolean);
        for (const slot of slots) {
          if (beatIdx >= expected) break;
          const nm = slot.match(/^([A-Ga-g][#b]?\d)(?:\/\d+\.{0,2})?/);
          if (nm) newTracks[t][beatIdx] = {note: nm[1]};
          beatIdx++;
        }
      }
    });

    S.tracks = newTracks;
    renderGrid();
    return null;
  } catch(e) {
    return e.message;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Import / Export
// ══════════════════════════════════════════════════════════════════════════════
function importFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;

    // Detect time signature and bar count from the file
    const timeM = text.match(/@TIME:\s*(\d+)\/(\d+)/);
    const bpmM  = text.match(/@BPM:\s*(\d+)/);

    if (bpmM)  { S.bpm = +bpmM[1]; document.getElementById('bpm-val').textContent = S.bpm; document.getElementById('sl-bpm').value = S.bpm; }
    if (timeM) {
      S.beatsPerBar = +timeM[1]; S.beatUnit = +timeM[2];
      const ts  = `${S.beatsPerBar}/${S.beatUnit}`;
      const sel = document.getElementById('sel-time');
      if ([...sel.options].some(o => o.value === ts)) sel.value = ts;
    }

    // Count measures in first T-track
    const t1m = text.match(/^T1:\s*([\s\S]*?)\s*\|\./m);
    if (t1m) {
      const flat  = t1m[1].replace(/\n\s+/g,' ');
      const bars  = (flat.match(/\|/g) || []).length + 1;
      const valid = [2,4,8,16];
      const best  = valid.reduce((a,b) => Math.abs(b-bars) < Math.abs(a-bars) ? b : a);
      S.numBars   = best;
      document.getElementById('sel-bars').value = best;
    }

    if (S.playing) stopAll();
    initTracks();
    document.getElementById('mmd-edit').value = text;
    parseMMDText(text);
    S.tokenMap = deriveTokenMap(text);
    input.value = '';
  };
  reader.readAsText(file);
}

function exportMMD() {
  const text = document.getElementById('mmd-edit').value;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/plain'}));
  a.download = 'score.mmd';
  a.click();
}

// ══════════════════════════════════════════════════════════════════════════════
// Settings
// ══════════════════════════════════════════════════════════════════════════════
function applySettings() {
  if (S.playing) stopAll();
  const [n, d] = document.getElementById('sel-time').value.split('/').map(Number);
  S.beatsPerBar = n;
  S.beatUnit    = d;
  S.numBars     = +document.getElementById('sel-bars').value;
  initTracks();
  renderGrid();
  rebuildMMD();
}

function newScore() {
  if (!confirm('Clear the score and start fresh?')) return;
  document.getElementById('sel-time').value = '4/4';
  document.getElementById('sel-bars').value = '4';
  document.getElementById('sl-bpm').value   = 120;
  onBpm(120);
  applySettings();
}

// ══════════════════════════════════════════════════════════════════════════════
// Keyboard shortcuts  (suppressed when textarea focused)
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const n = totalSteps();
  if      (e.key === 'ArrowRight') { e.preventDefault(); selectBeat(Math.min(S.selBeat+1, n-1)); }
  else if (e.key === 'ArrowLeft')  { e.preventDefault(); selectBeat(Math.max(S.selBeat-1, 0)); }
  else if (e.key === 'ArrowDown')  { e.preventDefault(); S.selTrack = 1; selectBeat(S.selBeat); }
  else if (e.key === 'ArrowUp')    { e.preventDefault(); S.selTrack = 0; selectBeat(S.selBeat); }
  else if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); clearSelected(); }
  else if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
  else if (e.key === 'Escape')     { stopAll(); }
});

// ══════════════════════════════════════════════════════════════════════════════
// Utility
// ══════════════════════════════════════════════════════════════════════════════
function mkEl(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showError(msg) {
  const el = document.getElementById('mmd-err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
  document.getElementById('mmd-hint').style.display = msg ? 'none' : 'block';
}

// ══════════════════════════════════════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════════════════════════════════════
applySettings();
renderPiano();
</script>
